# Opt-in SMTP infrastructure. Brought up independently:
#
#   cp shared/mail/mailserver.env.example shared/mail/mailserver.env
#   $EDITOR shared/mail/mailserver.env
#   ./scripts/up-mail.sh
#
# Mounts /etc/letsencrypt directly from the host (bind mount), so certs
# issued by the host certbot for the mail hostname are picked up without
# named-volume juggling. Make sure the host has the cert first:
#
#   ./scripts/issue-cert.sh smtp.your-domain.com

services:
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    restart: unless-stopped
    env_file: ./mailserver.env
    hostname: ${MAIL_HOSTNAME:-smtp}
    domainname: ${MAIL_DOMAIN}
    stop_grace_period: 1m
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    environment:
      - ENABLE_FAIL2BAN=1
      - ENABLE_CLAMAV=1
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_POSTGREY=1
    volumes:
      - mail-data:/var/mail
      - mail-state:/var/mail-state
      - mail-log:/var/log/mail
      - ./config:/tmp/docker-mailserver
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "25:25"     # SMTP (incoming)
      - "465:465"   # SMTPS
      - "587:587"   # Submission (STARTTLS)
      - "143:143"   # IMAP
      - "993:993"   # IMAPS

volumes:
  mail-data:
  mail-state:
  mail-log:
