# Catch-all default server.
# Purpose:
#   1. Serve /.well-known/acme-challenge/ for any unknown host on :80,
#      so issue-cert.sh works without per-domain temp configs.
#   2. Reject all other requests fast: 444 closes the connection
#      without sending a response (cheap for malicious scanners).
#
# Listed first by name so this file loads before alphabetic project configs.

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # Used by certbot --webroot during initial issuance.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 444;
    }
}

# HTTPS catch-all: clients that hit the IP directly with a Host that doesn't
# match any project get an immediate connection close. Without this block,
# the first project's server block becomes the default by accident.
server {
    listen      443 ssl default_server;
    listen      [::]:443 ssl default_server;
    http2       on;
    server_name _;

    ssl_reject_handshake on;
}
