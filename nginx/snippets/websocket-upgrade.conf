# WebSocket upgrade map. Sets $connection_upgrade = "upgrade" for websocket
# requests, "close" otherwise. Used by Portainer (terminal) and any project
# that proxies a websocket endpoint.
#
# Usage in a location:
#   include /etc/nginx/snippets/proxy-common.conf;       # sets Connection ""
#   proxy_set_header Upgrade    $http_upgrade;           # ws upgrade
#   proxy_set_header Connection $connection_upgrade;     # overrides ""
#   proxy_pass http://127.0.0.1:<port>;
#
# nginx applies the LAST matching proxy_set_header within a context, so
# overriding Connection after the include works correctly.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
