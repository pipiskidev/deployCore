services:
  max-backend:
    image: openjdk:17-jdk-slim
    container_name: max-backend
    restart: unless-stopped
    env_file: ./.env
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - MONGO_HOST=max-mongo
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    expose:
      - "8080"
    volumes:
      - ${BACKEND_JAR_DIR:-/home/maxAgent/backend/target}:/app:ro
      - ${STATIC_DIR:-/home/static}:/home/static
    working_dir: /app
    command: java -Djava.awt.headless=true -jar /app/Backend-1.0-SNAPSHOT.jar
    profiles:
      - full
      - backend
    networks:
      - web
      - max-internal
    depends_on:
      - max-mongo

  max-web:
    image: node:20-alpine
    container_name: max-web
    restart: unless-stopped
    env_file: ./.env
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - NODE_ENV=production
    expose:
      - "3000"
    volumes:
      - ${FRONTEND_DIR:-/home/maxAgent/frontend/sources}:/app
    working_dir: /app
    command: >
      sh -c "
        if [ ! -d node_modules ]; then npm ci --no-audit --silent; fi
        && npm run build
        && npm run start
      "
    profiles:
      - full
      - web
    networks:
      - web

  max-mongo:
    image: mongo:7
    container_name: max-mongo
    restart: unless-stopped
    env_file: ./.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - max-mongo-data:/data/db
    profiles:
      - full
      - backend
    networks:
      - max-internal

volumes:
  max-mongo-data:

networks:
  web:
    external: true
  max-internal:
