# Standard proxy headers and timeouts. Include this once per `location` that
# does proxy_pass. Add per-location overrides AFTER the include if you need
# longer timeouts (e.g. uploads) or different buffering (e.g. SSE/websockets).

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

proxy_http_version 1.1;
proxy_set_header   Connection "";

proxy_connect_timeout 10s;
proxy_send_timeout    30s;
proxy_read_timeout    30s;

proxy_buffers          16 16k;
proxy_buffer_size      32k;
proxy_busy_buffers_size 64k;
