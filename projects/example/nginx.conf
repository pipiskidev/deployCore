# example project — host nginx server block.
# Lives at /etc/nginx/conf.d/example.conf (symlinked by add-project.sh or set up
# manually per the README).
#
# Replace `example.example.com` with the real domain before symlinking.
# From the repo root:
#
#   sed -i "s/example.example.com/$(grep '^EXAMPLE_DOMAIN=' projects/example/.env | cut -d= -f2)/g" \
#     projects/example/nginx.conf
#   sudo ln -sf "$(pwd)/projects/example/nginx.conf" /etc/nginx/conf.d/example.conf
#   ./scripts/issue-cert.sh "$(grep '^EXAMPLE_DOMAIN=' projects/example/.env | cut -d= -f2)"
#   ./scripts/reload-nginx.sh

server {
    listen      80;
    listen      [::]:80;
    server_name example.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name example.example.com;

    ssl_certificate         /etc/letsencrypt/live/example.example.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/example.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.example.com/chain.pem;

    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Backend API and webhook routes — host nginx proxies to the backend
    # container's loopback bind (127.0.0.1:8066 → container :8080).
    location ~ ^/(api|hooks|actuator|oauth2|login|logout|leads|tg|media|amo|track) {
        limit_req  zone=api burst=60 nodelay;
        limit_conn conn_per_ip 50;

        include /etc/nginx/snippets/proxy-common.conf;
        proxy_next_upstream         error timeout http_502;
        proxy_next_upstream_tries   3;
        proxy_next_upstream_timeout 10s;

        proxy_pass http://127.0.0.1:8066;
    }

    # Image / file routes — also handled by the backend.
    location ~ ^/(image|generate-image|files) {
        limit_req zone=api burst=60 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:8066;
    }

    # Frontend (Next.js, container :3000 → host 127.0.0.1:3005).
    location / {
        limit_req  zone=general burst=20 nodelay;
        limit_conn conn_per_ip 30;

        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3005;
    }
}
