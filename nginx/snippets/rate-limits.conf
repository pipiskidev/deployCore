# Rate limit zones (must be in the http context — included once from nginx.conf).
# Apply per-location with: limit_req zone=<name> burst=<n> nodelay;
#
# Defaults are intentionally generous; tighten for sensitive endpoints
# (auth/login pages, write-heavy APIs) at the location level.

limit_req_zone  $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone  $binary_remote_addr zone=auth:10m    rate=3r/s;
limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

limit_req_status  429;
limit_conn_status 429;
