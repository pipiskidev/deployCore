# Reusable TLS settings included in every project's HTTPS server block.
# These intentionally duplicate the http-block ssl_* directives so projects
# remain readable in isolation; nginx merges them without conflict.

ssl_protocols              TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers  on;
ssl_ciphers                'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
ssl_ecdh_curve             X25519:P-256:P-384:P-521;
ssl_session_cache          shared:SSL:10m;
ssl_session_timeout        10m;
ssl_session_tickets        off;
ssl_stapling               on;
ssl_stapling_verify        on;
