user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 epoll;
}

http {
    ##
    # Basic
    ##
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    types_hash_max_size            2048;
    server_names_hash_bucket_size  128;
    server_names_hash_max_size     2048;

    ##
    # Limits
    ##
    client_max_body_size            50m;
    client_body_buffer_size         128k;
    client_header_buffer_size       4k;
    large_client_header_buffers     4 16k;
    keepalive_requests              100;
    keepalive_timeout               15;
    send_timeout                    30;

    ##
    # Logging
    ##
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    ##
    # Gzip
    ##
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_min_length    1024;
    gzip_comp_level    5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    ##
    # SSL
    ##
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers                'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_ecdh_curve             X25519:P-256:P-384:P-521;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        10m;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    real_ip_header CF-Connecting-IP;

    ##
    # Rate-limit zones (applied per-location in projects)
    ##
    include /etc/nginx/snippets/rate-limits.conf;

    ##
    # Optional: bot/prerender detection (consumed only by projects that opt in)
    ##
    include /etc/nginx/snippets/bot-detection.conf;

    ##
    # Per-project server blocks + the catch-all _default.conf
    ##
    include /etc/nginx/conf.d/*.conf;
}
