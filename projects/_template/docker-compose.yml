# Project template. Substituted by add-project.sh:
#   ${PROJECT_NAME} → project slug, used as container name prefix
#   ${IMAGE}        → docker image (e.g. node:20-alpine, openjdk:17-jdk-slim)
#   ${APP_PORT}     → port the app listens on inside the container
#   ${HOST_PORT}    → port on the host (loopback) where nginx will reach it
#                     (auto-assigned by add-project.sh from a free range)
#
# Profiles let you bring services up selectively:
#   docker compose up -d                          → only services without a profile
#   docker compose --profile full up -d           → everything
#   docker compose --profile app up -d            → just the app container

services:
  ${PROJECT_NAME}-app:
    image: ${IMAGE}
    container_name: ${PROJECT_NAME}-app
    restart: unless-stopped
    env_file: ./.env
    ports:
      # Loopback-only bind: only host nginx reaches the container.
      # Don't change to 0.0.0.0 — that bypasses TLS, headers, and rate limits.
      - "127.0.0.1:${HOST_PORT}:${APP_PORT}"
    profiles:
      - full
      - app
    networks:
      - ${PROJECT_NAME}-internal

networks:
  ${PROJECT_NAME}-internal:
