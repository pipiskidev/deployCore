# max project — nginx server block.
#
# Replace `max.example.com` with the real domain before symlinking into
# core/nginx/conf.d/. From the repo root:
#
#   sed -i 's/max.example.com/<your-domain>/g' projects/max/nginx.conf
#   ln -sf "$(pwd)/projects/max/nginx.conf" core/nginx/conf.d/max.conf
#   ./scripts/issue-cert.sh <your-domain>
#   ./scripts/reload-nginx.sh

server {
    listen      80;
    listen      [::]:80;
    server_name max.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name max.example.com;

    ssl_certificate         /etc/letsencrypt/live/max.example.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/max.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/max.example.com/chain.pem;

    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Backend API and webhook routes — addressed by container name.
    location ~ ^/(api|hooks|actuator|oauth2|login|logout|leads|tg|media|amo|track) {
        limit_req  zone=api burst=60 nodelay;
        limit_conn conn_per_ip 50;

        include /etc/nginx/snippets/proxy-common.conf;
        proxy_next_upstream         error timeout http_502;
        proxy_next_upstream_tries   3;
        proxy_next_upstream_timeout 10s;

        proxy_pass http://max-backend:8080;
    }

    # Static files served directly from /home/static (mounted into nginx? no:
    # nginx is in core, doesn't mount static). For now, route /image and
    # /files through the backend (it knows where /home/static lives).
    location ~ ^/(image|generate-image|files) {
        limit_req  zone=api burst=60 nodelay;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://max-backend:8080;
    }

    # Frontend (Next.js).
    location / {
        limit_req  zone=general burst=20 nodelay;
        limit_conn conn_per_ip 30;

        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://max-web:3000;
    }
}
