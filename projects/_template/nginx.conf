# Project nginx config. Lives at /etc/nginx/conf.d/${PROJECT_NAME}.conf on
# the host (symlinked there by add-project.sh).
#
# Substituted by add-project.sh at copy time:
#   ${PROJECT_NAME} → matches container name prefix (informational only — host
#                     nginx proxies to 127.0.0.1, not to a container DNS name)
#   ${DOMAIN}       → public hostname; must have a Let's Encrypt cert by issue-cert.sh
#   ${HOST_PORT}    → loopback port the app container is bound to

server {
    listen      80;
    listen      [::]:80;
    server_name ${DOMAIN};

    # Renewal of an already-issued cert (host certbot uses webroot too).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name ${DOMAIN};

    ssl_certificate         /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;

    location / {
        limit_req  zone=general burst=20 nodelay;
        limit_conn conn_per_ip 30;

        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:${HOST_PORT};
    }
}
